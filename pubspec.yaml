name: mamacita
description: A pregnancy companion app for mothers and midwives.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  http: ^1.1.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  percent_indicator: ^4.2.3
  flutter_svg: ^2.0.9
  intl: ^0.18.1
  google_sign_in: ^6.1.6
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

